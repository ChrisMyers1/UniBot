services:
  postgres:
    image: postgres:16
    container_name: unibot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: unibot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: unibot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  bot:
    build: .
    container_name: unibot
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      CLIENT_ID: ${CLIENT_ID}
      DATABASE_URL: ${DATABASE_URL}

volumes:
  postgres_data: